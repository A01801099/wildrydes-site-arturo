<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Rydes — Create Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <span class="logo-icon">🦄</span>
            <span class="logo-text">Wild Rydes</span>
        </a>
        <div class="navbar-links">
            <a href="signin.html">Sign In</a>
        </div>
    </nav>

    <!-- REGISTER FORM -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-emoji">🦄</span>
                <h1>Join Wild Rydes</h1>
                <p>Create your account to start riding</p>
            </div>

            <div id="noCognitoMessage" style="display:none;" class="alert-info">
                ⚠️ <strong>Cognito not configured.</strong> Please update <code>js/config.js</code> with your AWS Cognito credentials.
            </div>

            <form id="registrationForm">
                <div class="form-group">
                    <label for="emailInputRegister">Email Address</label>
                    <input type="email" id="emailInputRegister"
                        placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="passwordInputRegister">Password</label>
                    <input type="password" id="passwordInputRegister"
                        placeholder="Min. 8 characters" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="passwordInputRegister2">Confirm Password</label>
                    <input type="password" id="passwordInputRegister2"
                        placeholder="Repeat your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-purple btn-full">Create My Account</button>
            </form>

            <div class="auth-divider">or</div>

            <div class="auth-footer">
                Already have an account? <a href="signin.html">Sign in here</a>
            </div>
            <div class="auth-footer" style="margin-top:8px;">
                Have a verification code? <a href="verify.html">Verify email</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/cognito-auth.js"></script>
</body>
</html>
