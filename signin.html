<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Rydes — Sign In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <span class="logo-icon">🦄</span>
            <span class="logo-text">Wild Rydes</span>
        </a>
        <div class="navbar-links">
            <a href="register.html" class="btn-nav-primary">Sign Up Free</a>
        </div>
    </nav>

    <!-- SIGNIN FORM -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-emoji">🔐</span>
                <h1>Welcome Back</h1>
                <p>Sign in to request your unicorn</p>
            </div>

            <div id="noCognitoMessage" style="display:none;" class="alert-info">
                ⚠️ <strong>Cognito not configured.</strong> Please update <code>js/config.js</code> with your AWS credentials.
            </div>

            <form id="signInForm">
                <div class="form-group">
                    <label for="emailInputSignIn">Email Address</label>
                    <input type="email" id="emailInputSignIn"
                        placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="passwordInputSignIn">Password</label>
                    <input type="password" id="passwordInputSignIn"
                        placeholder="Your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
            </form>

            <div class="auth-divider">or</div>

            <div class="auth-footer">
                New to Wild Rydes? <a href="register.html">Create a free account</a>
            </div>
            <div class="auth-footer" style="margin-top:8px;">
                Need to verify your email? <a href="verify.html">Enter code here</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/cognito-auth.js"></script>
</body>
</html>
